openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: meets
    description: Swim meet operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /meets:
    get:
      operationId: listMeets
      tags: [meets]
      summary: List upcoming NJ swim meets
      description: Returns upcoming NJ swim meets scraped from SwimCloud, cached for 1 hour
      responses:
        "200":
          description: List of meets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeetListResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    SwimMeet:
      type: object
      properties:
        name:
          type: string
        location:
          type: string
        date:
          type: string
        url:
          type: string
      required:
        - name
        - location
        - date
        - url
    MeetListResponse:
      type: object
      properties:
        meets:
          type: array
          items:
            $ref: "#/components/schemas/SwimMeet"
        cachedAt:
          type: string
      required:
        - meets
        - cachedAt

