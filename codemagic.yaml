workflows:
  ios-app-store:
    name: SwimTrack iOS App Store
    max_build_duration: 120
    environment:
      node: v20
      groups:
        - expo_credentials
    scripts:
      - name: Enable pnpm
        script: |
          corepack enable
          corepack prepare pnpm@9 --activate
          pnpm --version
      - name: Install dependencies
        script: |
          pnpm install --no-frozen-lockfile
      - name: Build via EAS
        script: |
          cd artifacts/mobile
          npx eas-cli build --platform ios --profile production --non-interactive --wait
      - name: Submit to App Store
        script: |
          cd artifacts/mobile
          npx eas-cli submit --platform ios --latest --non-interactive
    artifacts:
      - artifacts/mobile/*.ipa
